<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E07A5F"/>
      <stop offset="100%" style="stop-color:#c9644a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Bowl -->
  <ellipse cx="256" cy="320" rx="140" ry="60" fill="#FAF3E0" opacity="0.95"/>
  <path d="M116 320 Q116 400 256 400 Q396 400 396 320" fill="#FAF3E0" opacity="0.95"/>

  <!-- Ingredients in bowl -->
  <circle cx="200" cy="310" r="25" fill="#F4A261"/>
  <circle cx="260" cy="300" r="20" fill="#F2CC8F"/>
  <circle cx="310" cy="315" r="22" fill="#81B29A"/>

  <!-- Measuring spoon -->
  <g transform="rotate(-30 180 180)">
    <rect x="100" y="140" width="16" height="120" rx="4" fill="#FAF3E0"/>
    <ellipse cx="108" cy="140" rx="30" ry="20" fill="#FAF3E0"/>
  </g>

  <!-- Plus/Scale symbol -->
  <g transform="translate(340, 140)">
    <circle cx="0" cy="0" r="45" fill="#FAF3E0" opacity="0.9"/>
    <rect x="-25" y="-6" width="50" height="12" rx="4" fill="#E07A5F"/>
    <rect x="-6" y="-25" width="12" height="50" rx="4" fill="#E07A5F"/>
  </g>
</svg>
